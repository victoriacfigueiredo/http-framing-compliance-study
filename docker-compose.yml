services:
  backend:
    image: python:3.12-slim
    container_name: rfc9112-backend
    working_dir: /app
    volumes:
      - ./backend:/app
    command: python echo_server.py
    ports:
      - "8080:8080"

  nginx:
    image: nginx:latest
    container_name: rfc9112-nginx
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "8081:80"
    depends_on:
      - backend

  haproxy:
    image: haproxy:latest
    container_name: rfc9112-haproxy
    volumes:
      - ./docker/haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "8082:80"
    depends_on:
      - backend